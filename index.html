<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>thienan0212 - Profile</title>
    <!-- Nhúng font chữ chuyên nghiệp từ Google Fonts -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #121316; /* Nền tối xám đen */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #E5E7EB;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Khung chứa nội dung màu xám tối phối với viền tinh tế */
        .profile-card {
            background: #1C1D22;
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
        }

        .avatar-wrapper {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 24px auto;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.08);
        }

        /* Đổi chấm trạng thái sang màu xám sáng hoặc xanh mint nhạt cho hợp tông xám */
        .status-dot {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 16px;
            height: 16px;
            background-color: #9CA3AF; /* Xám sáng sáng */
            border: 3px solid #1C1D22;
            border-radius: 50%;
        }

        .username {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -1px;
            color: #FFFFFF;
            margin-bottom: 8px;
        }

        .tagline {
            font-size: 14px;
            color: #9CA3AF;
            font-weight: 400;
            margin-bottom: 32px;
            letter-spacing: 0.5px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* Nút bấm trạng thái mặc định: Màu xám tối đồng bộ nền */
        .link-item {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            color: #9CA3AF; /* Chữ xám nhẹ mặc định */
            font-weight: 600;
            font-size: 15px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            
            transform: translate3d(0, 0, 0); 
            -webkit-transform: translate3d(0, 0, 0);
            will-change: transform; 

            transition: transform 0.15s cubic-bezier(0.2, 0.8, 0.2, 1),
                        background-color 0.1s ease, border-color 0.1s ease, box-shadow 0.1s ease, color 0.1s ease;
        }

        /* 
           HIỆU ỨNG TIỆM CẬN MÀU XÁM CAO CẤP:
           Khi chuột đến gần, nút sẽ lập tức chuyển sang màu trắng/xám sáng và nhấc lên nhẹ nhàng
        */
        .link-item.near {
            background-color: #FFFFFF !important; /* Biến thành nút trắng nổi bật */
            border-color: #FFFFFF !important;
            color: #121316 !important; /* Chữ chuyển thành màu tối để dễ đọc */
            transform: translate3d(0, -4px, 0);
            box-shadow: 0 12px 24px rgba(255, 255, 255, 0.12);
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="avatar-wrapper">
            <img class="avatar" src="https://placeholder.com" alt="thienan0212">
            <div class="status-dot"></div>
        </div>
        
        <h1 class="username">thienan0212</h1>
        
        <p class="tagline">Welcome to my profile</p>
        
        <div class="links-container">
            <a href="mailto:gmail-cua-ban@gmail.com" class="link-item">Gmail</a>
            <a href="https://youtube.com" target="_blank" class="link-item">YouTube</a>
            <a href="https://tiktok.com" target="_blank" class="link-item">TikTok</a>
            <a href="https://discord.gg" target="_blank" class="link-item">Discord Cá Nhân</a>
            <a href="https://discord.gg" target="_blank" class="link-item">Discord Team</a>
        </div>
    </div>

    <!-- Giữ nguyên JS nhận diện khoảng cách chuột siêu nhạy -->
    <script>
        const items = document.querySelectorAll('.link-item');
        const triggerDistance = 20; // Chuột cách nút 60px là đổi màu liền

        document.addEventListener('mousemove', (e) => {
            const mouseX = e.clientX;
            const mouseY = e.clientY;

            items.forEach(item => {
                const rect = item.getBoundingClientRect();
                
                const closestX = Math.max(rect.left, Math.min(mouseX, rect.right));
                const closestY = Math.max(rect.top, Math.min(mouseY, rect.bottom));
                
                const distanceX = mouseX - closestX;
                const distanceY = mouseY - closestY;
                const distance = Math.sqrt(distanceX * distanceX + distanceY * distanceY);

                if (distance < triggerDistance) {
                    item.classList.add('near');
                } else {
                    item.classList.remove('near');
                }
            });
        });
    </script>
</body>
</html>
