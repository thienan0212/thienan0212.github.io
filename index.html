<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>thienan0212 - Profile</title>
    <!-- Nhúng font chữ chuyên nghiệp từ Google Fonts -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0D0E11; /* Nền tối xám sâu */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #E5E7EB;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Khung chứa nội dung màu xám tối phối với viền tinh tế */
        .profile-card {
            background: #16171C;
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 28px;
            padding: 50px 35px; /* Tăng padding để khung rộng rãi hơn */
            width: 100%;
            max-width: 460px; /* Tăng chiều rộng khung */
            text-align: center;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.6);
        }

        .avatar-wrapper {
            position: relative;
            width: 120px; /* Tăng kích thước avatar */
            height: 120px;
            margin: 0 auto 28px auto;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.08);
        }

        .status-dot {
            position: absolute;
            bottom: 6px;
            right: 6px;
            width: 18px;
            height: 18px;
            background-color: #9CA3AF;
            border: 3px solid #16171C;
            border-radius: 50%;
        }

        .username {
            font-size: 38px; /* Tăng size chữ tên của bạn */
            font-weight: 800;
            letter-spacing: -1px;
            color: #FFFFFF;
            margin-bottom: 10px;
        }

        .tagline {
            font-size: 15px;
            color: #9CA3AF;
            font-weight: 400;
            margin-bottom: 38px;
            letter-spacing: 0.5px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 18px; /* Tăng khoảng cách giữa các nút */
        }

        /* 
           THIẾT KẾ NÚT TO HƠN & HỖ TRỢ BLUR ANIMATION:
           Mặc định nút sẽ có một lớp kính mờ nhẹ sẵn để khi transition sang trạng thái blur không bị giật.
        */
        .link-item {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px; /* Tăng đáng kể độ dày (padding) giúp nút TO và RỘNG hơn */
            border-radius: 16px; /* Bo góc mềm mại hơn */
            text-decoration: none;
            color: #9CA3AF;
            font-weight: 600;
            font-size: 16px; /* Tăng kích thước chữ trong nút */
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            
            transform: translate3d(0, 0, 0); 
            -webkit-transform: translate3d(0, 0, 0);
            will-change: transform, backdrop-filter, background-color; 

            /* Thiết lập hiệu ứng chuyển cảnh mượt mà bao gồm cả hiệu ứng làm mờ (backdrop-filter) */
            transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1),
                        background-color 0.2s ease, 
                        border-color 0.2s ease, 
                        box-shadow 0.2s ease, 
                        color 0.2s ease,
                        backdrop-filter 0.2s ease,
                        -webkit-backdrop-filter 0.2s ease;
        }

        /* 
           HIỆU ỨNG TIỆM CẬN NÂNG CẤP KÍNH MỜ (BLUR ANIMATION):
           Khi chuột đến gần, nút tự động kích hoạt lớp kính mờ (blur), nền xám sáng trong suốt và nổi lên.
        */
        .link-item.near {
            background-color: rgba(255, 255, 255, 0.15) !important; /* Nền xám trắng trong suốt */
            border-color: rgba(255, 255, 255, 0.25) !important;
            color: #FFFFFF !important; /* Chữ chuyển sang trắng nổi bật */
            
            /* Kích hoạt hiệu ứng Blur mịn màng xuyên thấu */
            backdrop-filter: blur(12px) !important;
            -webkit-backdrop-filter: blur(12px) !important;
            
            transform: translate3d(0, -5px, 0); /* Nhấc nút lên cao hơn tạo độ sâu */
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3), 0 0 15px rgba(255, 255, 255, 0.03);
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="avatar-wrapper">
            <img class="avatar" src="https://placeholder.com" alt="thienan0212">
            <div class="status-dot"></div>
        </div>
        
        <h1 class="username">thienan0212</h1>
        
        <p class="tagline">Welcome to my profile</p>
        
        <div class="links-container">
            <a href="mailto:gmail-cua-ban@gmail.com" class="link-item">Gmail</a>
            <a href="https://youtube.com" target="_blank" class="link-item">YouTube</a>
            <a href="https://tiktok.com" target="_blank" class="link-item">TikTok</a>
            <a href="https://discord.gg" target="_blank" class="link-item">Discord Cá Nhân</a>
            <a href="https://discord.gg" target="_blank" class="link-item">Discord Team</a>
        </div>
    </div>

    <!-- JavaScript đo khoảng cách chuột siêu nhạy đón đầu chuyển động -->
    <script>
        const items = document.querySelectorAll('.link-item');
        const triggerDistance = 75; // Tăng nhẹ phạm vi nhận diện lên 75px để hiệu ứng blur đón đầu mượt hơn nữa

        document.addEventListener('mousemove', (e) => {
            const mouseX = e.clientX;
            const mouseY = e.clientY;

            items.forEach(item => {
                const rect = item.getBoundingClientRect();
                
                const closestX = Math.max(rect.left, Math.min(mouseX, rect.right));
                const closestY = Math.max(rect.top, Math.min(mouseY, rect.bottom));
                
                const distanceX = mouseX - closestX;
                const distanceY = mouseY - closestY;
                const distance = Math.sqrt(distanceX * distanceX + distanceY * distanceY);

                if (distance < triggerDistance) {
                    item.classList.add('near');
                } else {
                    item.classList.remove('near');
                }
            });
        });
    </script>
</body>
</html>
