<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>thienan0212 - Profile</title>
    <!-- Nhúng font chữ chuyên nghiệp từ Google Fonts -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #080B11; /* Đổi sang nền tối tĩnh để mượt 100% */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #F3F4F6;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Khung chứa nội dung loại bỏ blur để tối ưu phần cứng */
        .profile-card {
            background: #111827;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        /* Ảnh đại diện tối giản */
        .avatar-wrapper {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 24px auto;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        /* Điểm xanh hiển thị trạng thái trực tuyến */
        .status-dot {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 16px;
            height: 16px;
            background-color: #10B981;
            border: 3px solid #111827;
            border-radius: 50%;
        }

        /* Chữ thienan0212 To, Đậm, Phông Đẹp */
        .username {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #FFFFFF 30%, #9CA3AF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .tagline {
            font-size: 14px;
            color: #9CA3AF;
            font-weight: 400;
            margin-bottom: 32px;
            letter-spacing: 0.5px;
        }

        /* Khu vực các nút liên kết */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* Tối ưu hiệu ứng chuyển động mượt mà bằng cubic-bezier và dùng hardware acceleration */
        .link-item {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            color: #FFFFFF;
            font-weight: 600;
            font-size: 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transform: translateZ(0); /* Kích hoạt tăng tốc phần cứng GPU */
            transition: transform 0.25s cubic-bezier(0.25, 1, 0.5, 1), 
                        background-color 0.25s ease, 
                        border-color 0.25s ease, 
                        box-shadow 0.25s ease;
        }

        /* Hiệu ứng di chuột đổi màu theo thương hiệu cực kỳ mềm mại */
        .link-item.gmail:hover {
            background: #EA4335;
            border-color: #EA4335;
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 20px rgba(234, 67, 53, 0.25);
        }

        .link-item.youtube:hover {
            background: #FF0000;
            border-color: #FF0000;
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 20px rgba(255, 0, 0, 0.25);
        }

        .link-item.tiktok:hover {
            background: #010101;
            border-color: #25F4EE;
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 20px rgba(37, 244, 238, 0.15);
        }

        .link-item.discord:hover {
            background: #5865F2;
            border-color: #5865F2;
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 20px rgba(88, 101, 242, 0.25);
        }

        .link-item.discord-team {
            border-color: rgba(88, 101, 242, 0.2);
        }

        .link-item.discord-team:hover {
            background: linear-gradient(135deg, #5865F2, #7289DA);
            border-color: #5865F2;
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 20px rgba(88, 101, 242, 0.3);
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="avatar-wrapper">
            <!-- Thay đường link ảnh chân dung của bạn vào đây -->
            <img class="avatar" src="https://placeholder.com" alt="thienan0212">
            <div class="status-dot"></div>
        </div>
        
        <!-- Tên định danh to và chuyên nghiệp -->
        <h1 class="username">thienan0212</h1>
        
        <p class="tagline">Welcome to my profile</p>
        
        <div class="links-container">
            <!-- Nút liên kết Gmail -->
            <a href="mailto:gmail-cua-ban@gmail.com" class="link-item gmail">Gmail</a>
            
            <!-- Nút liên kết YouTube -->
            <a href="https://youtube.com" target="_blank" class="link-item youtube">YouTube</a>

            <!-- Nút liên kết TikTok -->
            <a href="https://tiktok.com" target="_blank" class="link-item tiktok">TikTok</a>
            
            <!-- Nút liên kết Discord Cá Nhân -->
            <a href="https://discord.gg" target="_blank" class="link-item discord">Discord Cá Nhân</a>

            <!-- Nút liên kết Discord Team -->
            <a href="https://discord.gg" target="_blank" class="link-item discord-team">Discord Team</a>
        </div>
    </div>

</body>
</html>
