<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>thienan0212 - Profile</title>
    <!-- Nhúng font chữ chuyên nghiệp từ Google Fonts -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Ẩn con trỏ chuột mặc định */
        html, body, a, button {
            cursor: none !important;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0D0E11;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #E5E7EB;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* LUỒNG ÁNH SÁNG THEO CHUỘT (SPOTLIGHT) */
        .mouse-light {
            position: fixed;
            top: 0;
            left: 0;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.01) 50%, transparent 75%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            transform: translate3d(-50%, -50%, 0);
            will-change: transform, filter;
            transition: transform 0.1s cubic-bezier(0.25, 1, 0.5, 1), filter 0.05s ease-out;
        }

        /* CON TRỎ CHUỘT DẤU CHẤM */
        .custom-cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 8px;
            height: 8px;
            background-color: #FFFFFF;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate3d(-50%, -50%, 0);
            will-change: transform, filter;
            transition: transform 0.03s ease-out, filter 0.03s ease-out;
        }

        /* Khung chứa nội dung */
        .profile-card {
            background: #16171C;
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 28px;
            padding: 50px 35px;
            width: 100%;
            max-width: 460px;
            text-align: center;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.6);
            position: relative;
            z-index: 2;
        }

        .avatar-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 28px auto;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.08);
        }

        .status-dot {
            position: absolute;
            bottom: 6px;
            right: 6px;
            width: 18px;
            height: 18px;
            background-color: #9CA3AF;
            border: 3px solid #16171C;
            border-radius: 50%;
        }

        .username {
            font-size: 38px;
            font-weight: 800;
            letter-spacing: -1px;
            color: #FFFFFF;
            margin-bottom: 10px;
        }

        .tagline {
            font-size: 15px;
            color: #9CA3AF;
            font-weight: 400;
            margin-bottom: 38px;
            letter-spacing: 0.5px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* CẤU HÌNH NÚT MẶC ĐỊNH */
        .link-item {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
            border-radius: 16px;
            text-decoration: none;
            color: #9CA3AF;
            font-weight: 600;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            
            /* Kích hoạt tăng tốc phần cứng */
            transform: translate3d(0, 0, 0) scale(1); 
            will-change: transform, filter, background-color, backdrop-filter; 

            /* Thiết lập thời gian chuyển cảnh riêng biệt: 
               Thời gian phóng to nhấc nút là 0.25s theo đường cong mượt, 
               Thời gian mờ nhòe (filter) phản hồi siêu tốc 0.1s để tạo độ giật Motion Blur */
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
                        filter 0.1s ease-out,
                        background-color 0.2s ease, 
                        border-color 0.2s ease, 
                        box-shadow 0.2s ease, 
                        color 0.2s ease,
                        backdrop-filter 0.2s ease;
        }

        /* 
           HIỆU ỨNG PHÓNG TO KÈM MOTION BLUR KHI CHUỘT ĐẾN GẦN:
           - Tự động kích hoạt phóng to lên 1.06 lần (scale(1.06)) và nhấc nhẹ lên trên.
           - Thêm hiệu ứng nhòe vật lý blur(4px) lồng vào quá trình scale chuyển cảnh.
        */
        .link-item.near {
            background-color: rgba(255, 255, 255, 0.15) !important;
            border-color: rgba(255, 255, 255, 0.25) !important;
            color: #FFFFFF !important;
            
            backdrop-filter: blur(8px) !important;
            -webkit-backdrop-filter: blur(8px) !important;
            
            /* PHÓNG TO NÚT */
            transform: translate3d(0, -4px, 0) scale(1.06);
            
            /* KÍCH HOẠT MOTION BLUR CHO NÚT (Sẽ được ép mượt và xóa nhòe dần bằng JS khi dừng hành động) */
            filter: blur(3px);
            
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
        }
    </style>
</head>
<body>

    <div class="mouse-light" id="mouseLight"></div>
    <div class="custom-cursor" id="customCursor"></div>

    <div class="profile-card">
        <div class="avatar-wrapper">
            <img class="avatar" src="https://placeholder.com" alt="thienan0212">
            <div class="status-dot"></div>
        </div>
        
        <h1 class="username">thienan0212</h1>
        
        <p class="tagline">Welcome to my profile</p>
        
        <div class="links-container">
            <a href="mailto:gmail-cua-ban@gmail.com" class="link-item">Gmail</a>
            <a href="https://youtube.com" target="_blank" class="link-item">YouTube</a>
            <a href="https://tiktok.com" target="_blank" class="link-item">TikTok</a>
            <a href="https://discord.gg" target="_blank" class="link-item">Discord Cá Nhân</a>
            <a href="https://discord.gg" target="_blank" class="link-item">Discord Team</a>
        </div>
    </div>

    <script>
        const cursor = document.getElementById('customCursor');
        const light = document.getElementById('mouseLight');
        const items = document.querySelectorAll('.link-item');
        const triggerDistance = 75;

        let lastX = 0;
        let lastY = 0;
        let blurTimeout;

        document.addEventListener('mousemove', (e) => {
            const mouseX = e.clientX;
            const mouseY = e.clientY;

            // Đo tốc độ chuột thực tế
            const deltaX = mouseX - lastX;
            const deltaY = mouseY - lastY;
            const speed = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
            const angle = Math.atan2(deltaY, deltaX) * (180 / Math.PI);
            
            // Xử lý Motion Blur con trỏ chuột dựa vào tốc độ vẩy tay
            const stretch = Math.min(1 + speed / 25, 3.5); 
            const blurAmount = Math.min(speed / 12, 6); 

            cursor.style.transform = `translate3d(${mouseX}px, ${mouseY}px, 0) translate(-50%, -50%) rotate(${angle}deg) scaleX(${stretch})`;
            cursor.style.filter = `blur(${blurAmount}px)`;

            light.style.transform = `translate3d(${mouseX}px, ${mouseY}px, 0) translate(-50%, -50%) rotate(${angle}deg) scaleX(${stretch * 1.05})`;
            light.style.filter = `blur(${blurAmount * 0.5}px)`;

            lastX = mouseX;
            lastY = mouseY;

            // XỬ LÝ TIỆM CẬN NÚT BẤM + ĐIỀU PHỐI ĐỘ SẮC NÉT SAU KHI PHÓNG TO
            items.forEach(item => {
                const rect = item.getBoundingClientRect();
                const closestX = Math.max(rect.left, Math.min(mouseX, rect.right));
                const closestY = Math.max(rect.top, Math.min(mouseY, rect.bottom));
                const dX = mouseX - closestX;
                const dY = mouseY - closestY;
                const distance = Math.sqrt(dX * dX + dY * dY);

                if (distance < triggerDistance) {
                    // Chuột tiến đến gần -> Kích hoạt class 'near' (Nút tự phóng to + tự nhòe blur(3px) tức thì)
                    item.classList.add('near');
                } else {
                    // Chuột rời đi -> Thu nhỏ lại sắc nét
                    item.classList.remove('near');
                    item.style.filter = 'blur(0px)';
                }
            });

            // THUẬT TOÁN KHỬ BLUR CHO NÚT BẤM: 
            // Khi bro dừng chuột (không lướt nữa), các nút đang ở trạng thái phóng to sẽ tự động trả về độ sắc nét nét căng (blur(0px)) để nhìn rõ chữ.
            clearTimeout(blurTimeout);
            blurTimeout = setTimeout(() => {
                cursor.style.transform = `translate3d(${mouseX}px, ${mouseY}px, 0) translate(-50%, -50%) scaleX(1)`;
                cursor.style.filter = 'blur(0px)';
                light.style.transform = `translate3d(${mouseX}px, ${mouseY}px, 0) translate(-50%, -50%) scaleX(1)`;
                light.style.filter = 'blur(0px)';
                
                // Trả lại độ sắc nét cho nút khi chuột đứng im
