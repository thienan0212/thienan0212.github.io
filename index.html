<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>thienan0212 - Profile</title>
    <!-- Nhúng font chữ chuyên nghiệp từ Google Fonts -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Ẩn con trỏ chuột mặc định của hệ điều hành trên toàn bộ trang web */
        html, body, a, button {
            cursor: none !important;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0D0E11; /* Nền tối xám sâu */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #E5E7EB;
            padding: 20px;
            overflow: hidden; /* Tránh tràn trang khi luồng sáng di chuyển rộng */
            position: relative;
        }

        /* 
           HIỆU ỨNG LUỒNG ÁNH SÁNG (SPOTLIGHT):
           Tạo một dải sáng hình tròn mờ ảo chiếu từ dưới nền 
        */
        .mouse-light {
            position: fixed;
            top: 0;
            left: 0;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.04) 0%, rgba(255, 255, 255, 0.01) 40%, transparent 70%);
            border-radius: 50%;
            pointer-events: none; /* Không cản trở việc click */
            transform: translate(-50%, -50%);
            z-index: 1;
            will-change: left, top;
            /* Thêm transition nhẹ để luồng sáng di chuyển mượt mà, có độ trễ nhẹ tạo cảm giác nghệ thuật */
            transition: left 0.1s cubic-bezier(0.25, 1, 0.5, 1), top 0.1s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* 
           CON TRỎ CHUỘT DẠNG DẤU CHẤM:
        */
        .custom-cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 6px;
            height: 6px;
            background-color: #FFFFFF;
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 9999; /* Luôn nằm trên cùng mọi phần tử */
            will-change: left, top;
        }

        /* Khung chứa nội dung màu xám tối phối với viền tinh tế */
        .profile-card {
            background: #16171C;
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 28px;
            padding: 50px 35px;
            width: 100%;
            max-width: 460px;
            text-align: center;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.6);
            position: relative;
            z-index: 2; /* Nằm trên lớp luồng sáng */
        }

        .avatar-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 28px auto;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.08);
        }

        .status-dot {
            position: absolute;
            bottom: 6px;
            right: 6px;
            width: 18px;
            height: 18px;
            background-color: #9CA3AF;
            border: 3px solid #16171C;
            border-radius: 50%;
        }

        .username {
            font-size: 38px;
            font-weight: 800;
            letter-spacing: -1px;
            color: #FFFFFF;
            margin-bottom: 10px;
        }

        .tagline {
            font-size: 15px;
            color: #9CA3AF;
            font-weight: 400;
            margin-bottom: 38px;
            letter-spacing: 0.5px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
            border-radius: 16px;
            text-decoration: none;
            color: #9CA3AF;
            font-weight: 600;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            
            transform: translate3d(0, 0, 0); 
            -webkit-transform: translate3d(0, 0, 0);
            will-change: transform, backdrop-filter, background-color; 

            transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1),
                        background-color 0.2s ease, 
                        border-color 0.2s ease, 
                        box-shadow 0.2s ease, 
                        color 0.2s ease,
                        backdrop-filter 0.2s ease,
                        -webkit-backdrop-filter 0.2s ease;
        }

        /* Hiệu ứng tiệm cận kính mờ (Blur) */
        .link-item.near {
            background-color: rgba(255, 255, 255, 0.15) !important;
            border-color: rgba(255, 255, 255, 0.25) !important;
            color: #FFFFFF !important;
            
            backdrop-filter: blur(12px) !important;
            -webkit-backdrop-filter: blur(12px) !important;
            
            transform: translate3d(0, -5px, 0);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>

    <!-- Hai phần tử tùy biến cho con trỏ và ánh sáng -->
    <div class="mouse-light" id="mouseLight"></div>
    <div class="custom-cursor" id="customCursor"></div>

    <div class="profile-card">
        <div class="avatar-wrapper">
            <img class="avatar" src="https://placeholder.com" alt="thienan0212">
            <div class="status-dot"></div>
        </div>
        
        <h1 class="username">thienan0212</h1>
        
        <p class="tagline">Welcome to my profile</p>
        
        <div class="links-container">
            <a href="mailto:gmail-cua-ban@gmail.com" class="link-item">Gmail</a>
            <a href="https://youtube.com" target="_blank" class="link-item">YouTube</a>
            <a href="https://tiktok.com" target="_blank" class="link-item">TikTok</a>
            <a href="https://discord.gg" target="_blank" class="link-item">Discord Cá Nhân</a>
            <a href="https://discord.gg" target="_blank" class="link-item">Discord Team</a>
        </div>
    </div>

    <script>
        const cursor = document.getElementById('customCursor');
        const light = document.getElementById('mouseLight');
        const items = document.querySelectorAll('.link-item');
        const triggerDistance = 75;

        document.addEventListener('mousemove', (e) => {
            const mouseX = e.clientX;
            const mouseY = e.clientY;

            // 1. Cập nhật vị trí dấu chấm chuột (Phản hồi tức thì 0ms)
            cursor.style.left = mouseX + 'px';
            cursor.style.top = mouseY + 'px';

            // 2. Cập nhật vị trí luồng ánh sáng (Có độ trễ mượt từ CSS chuyển động theo)
            light.style.left = mouseX + 'px';
            light.style.top = mouseY + 'px';

            // 3. Đo khoảng cách xử lý hiệu ứng tiệm cận của các nút bấm
            items.forEach(item => {
                const rect = item.getBoundingClientRect();
                
                const closestX = Math.max(rect.left, Math.min(mouseX, rect.right));
                const closestY = Math.max(rect.top, Math.min(mouseY, rect.bottom));
                
                const distanceX = mouseX - closestX;
                const distanceY = mouseY - closestY;
                const distance = Math.sqrt(distanceX * distanceX + distanceY * distanceY);

                if (distance < triggerDistance) {
                    item.classList.add('near');
                } else {
                    item.classList.remove('near');
                }
            });
        });

        // Ẩn dấu chấm chuột khi người dùng di chuyển ra ngoài cửa sổ trình duyệt
        document.addEventListener('mouseleave', () => {
            cursor.style.opacity = '0';
            light.style.opacity = '0';
        });
        document.addEventListener('mouseenter', () => {
            cursor.style.opacity = '1';
            light.style.opacity = '1';
        });
    </script>
</body>
</html>
