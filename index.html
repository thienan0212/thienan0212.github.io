<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>thienan0212 - Profile</title>
    <!-- Nhúng font chữ chuyên nghiệp từ Google Fonts -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Ẩn con trỏ chuột mặc định */
        html, body, a, button {
            cursor: none !important;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0D0E11;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #E5E7EB;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* 
           LUỒNG ÁNH SÁNG THEO CHUỘT (SPOTLIGHT) 
           Delay chuẩn 0.1s + Tự động thêm hiệu ứng Blur đồ họa khi di chuyển
        */
        .mouse-light {
            position: fixed;
            top: 0;
            left: 0;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.01) 50%, transparent 75%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            transform: translate3d(-50%, -50%, 0);
            will-change: transform, filter;
            /* Delay chuẩn 0.1s */
            transition: transform 0.1s cubic-bezier(0.25, 1, 0.5, 1), filter 0.05s ease-out;
        }

        /* 
           CON TRỎ CHUỘT DẤU CHẤM CÓ MOTION BLUR ĐÍNH THỰC
        */
        .custom-cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 8px;
            height: 8px;
            background-color: #FFFFFF;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate3d(-50%, -50%, 0);
            will-change: transform, filter;
            /* Phản hồi siêu tốc và làm mượt hiệu ứng mờ nhòe */
            transition: transform 0.03s ease-out, filter 0.03s ease-out;
        }

        /* Khung chứa nội dung */
        .profile-card {
            background: #16171C;
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 28px;
            padding: 50px 35px;
            width: 100%;
            max-width: 460px;
            text-align: center;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.6);
            position: relative;
            z-index: 2;
        }

        .avatar-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 28px auto;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.08);
        }

        .status-dot {
            position: absolute;
            bottom: 6px;
            right: 6px;
            width: 18px;
            height: 18px;
            background-color: #9CA3AF;
            border: 3px solid #16171C;
            border-radius: 50%;
        }

        .username {
            font-size: 38px;
            font-weight: 800;
            letter-spacing: -1px;
            color: #FFFFFF;
            margin-bottom: 10px;
        }

        .tagline {
            font-size: 15px;
            color: #9CA3AF;
            font-weight: 400;
            margin-bottom: 38px;
            letter-spacing: 0.5px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
            border-radius: 16px;
            text-decoration: none;
            color: #9CA3AF;
            font-weight: 600;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            
            transform: translate3d(0, 0, 0); 
            will-change: transform, backdrop-filter, background-color; 

            transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1),
                        background-color 0.2s ease, 
                        border-color 0.2s ease, 
                        box-shadow 0.2s ease, 
                        color 0.2s ease,
                        backdrop-filter 0.2s ease,
                        -webkit-backdrop-filter 0.2s ease;
        }

        /* Hiệu ứng tiệm cận kính mờ (Blur) của nút */
        .link-item.near {
            background-color: rgba(255, 255, 255, 0.15) !important;
            border-color: rgba(255, 255, 255, 0.25) !important;
            color: #FFFFFF !important;
            
            backdrop-filter: blur(12px) !important;
            -webkit-backdrop-filter: blur(12px) !important;
            
            transform: translate3d(0, -5px, 0);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>

    <div class="mouse-light" id="mouseLight"></div>
    <div class="custom-cursor" id="customCursor"></div>

    <div class="profile-card">
        <div class="avatar-wrapper">
            <img class="avatar" src="https://placeholder.com" alt="thienan0212">
            <div class="status-dot"></div>
        </div>
        
        <h1 class="username">thienan0212</h1>
        
        <p class="tagline">Welcome to my profile</p>
        
        <div class="links-container">
            <a href="mailto:gmail-cua-ban@gmail.com" class="link-item">Gmail</a>
            <a href="https://youtube.com" target="_blank" class="link-item">YouTube</a>
            <a href="https://tiktok.com" target="_blank" class="link-item">TikTok</a>
            <a href="https://discord.gg" target="_blank" class="link-item">Discord Cá Nhân</a>
            <a href="https://discord.gg" target="_blank" class="link-item">Discord Team</a>
        </div>
    </div>

    <script>
        const cursor = document.getElementById('customCursor');
        const light = document.getElementById('mouseLight');
        const items = document.querySelectorAll('.link-item');
        const triggerDistance = 75;

        let lastX = 0;
        let lastY = 0;
        let blurTimeout;

        document.addEventListener('mousemove', (e) => {
            const mouseX = e.clientX;
            const mouseY = e.clientY;

            // Tính toán tốc độ di chuyển thực tế (pixel / frame)
            const deltaX = mouseX - lastX;
            const deltaY = mouseY - lastY;
            const speed = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
            
            const angle = Math.atan2(deltaY, deltaX) * (180 / Math.PI);
            
            // 1. ÉP CO DÃN VẬT LÝ THEO TỐC ĐỘ CHUỘT
            const stretch = Math.min(1 + speed / 25, 3.5); 

            // 2. ÉP ĐỘ MỜ NHÒE (MOTION BLUR) THEO TỐC ĐỘ CHUỘT
            // Vẩy chuột càng nhanh thì pixel blur càng lớn (giới hạn tối đa nhòe 6px)
            const blurAmount = Math.min(speed / 12, 6); 

            // Cập nhật vị trí và áp bộ lọc Blur thời gian thực cho con trỏ dấu chấm
            cursor.style.transform = `translate3d(${mouseX}px, ${mouseY}px, 0) translate(-50%, -50%) rotate(${angle}deg) scaleX(${stretch})`;
            cursor.style.filter = `blur(${blurAmount}px)`;

            // Cập nhật vị trí và áp bộ lọc Blur cộng dồn cho luồng ánh sáng (Delay 0.1s từ CSS xử lý)
            light.style.transform = `translate3d(${mouseX}px, ${mouseY}px, 0) translate(-50%, -50%) rotate(${angle}deg) scaleX(${stretch * 1.05})`;
            light.style.filter = `blur(${blurAmount * 0.5}px)`;

            lastX = mouseX;
            lastY = mouseY;

            // Xóa hiệu ứng nhòe ngay lập tức khi chuột dừng lại không di chuyển nữa
            clearTimeout(blurTimeout);
            blurTimeout = setTimeout(() => {
                cursor.style.transform = `translate3d(${mouseX}px, ${mouseY}px, 0) translate(-50%, -50%) scaleX(1)`;
                cursor.style.filter = 'blur(0px)';
                light.style.transform = `translate3d(${mouseX}px, ${mouseY}px, 0) translate(-50%, -50%) scaleX(1)`;
                light.style.filter = 'blur(0px)';
            }, 50);

            // 3. Xử lý tiệm cận nút bấm
            items.forEach(item => {
                const rect = item.getBoundingClientRect();
                const closestX = Math.max(rect.left, Math.min(mouseX, rect.right));
                const closestY = Math.max(rect.top, Math.min(mouseY, rect.bottom));
                const dX = mouseX - closestX;
                const dY = mouseY - closestY;
                const distance = Math.sqrt(dX * dX + dY * dY);

                if (distance < triggerDistance) {
                    item.classList.add('near');
                } else {
                    item.classList.remove('near');
                }
            });
        });

        document.addEventListener('mouseleave', () => {
            cursor.style.opacity = '0';
            light.style.opacity = '0';
        });
        document.addEventListener('mouseenter', () => {
            cursor.style.opacity = '1';
            light.style.opacity = '1';
        });
    </script>
</body>
</html>
