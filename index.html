<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>thienan0212 - Profile</title>
    <!-- Nhúng font chữ chuyên nghiệp từ Google Fonts -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #080B11;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #F3F4F6;
            padding: 20px;
            overflow-x: hidden;
        }

        .profile-card {
            background: #111827;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .avatar-wrapper {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 24px auto;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .status-dot {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 16px;
            height: 16px;
            background-color: #10B981;
            border: 3px solid #111827;
            border-radius: 50%;
        }

        .username {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -1px;
            color: #FFFFFF;
            margin-bottom: 8px;
        }

        .tagline {
            font-size: 14px;
            color: #9CA3AF;
            font-weight: 400;
            margin-bottom: 32px;
            letter-spacing: 0.5px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* Trạng thái mặc định của nút */
        .link-item {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            color: #FFFFFF;
            font-weight: 600;
            font-size: 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transform: translate3d(0, 0, 0); 
            will-change: transform, background-color, border-color, box-shadow;
            /* Đổi sang 0.1s để màu sắc bắt kịp tốc độ chuột ngay khi đến gần */
            transition: transform 0.15s cubic-bezier(0.2, 0.8, 0.2, 1),
                        background-color 0.1s ease, border-color 0.1s ease, box-shadow 0.1s ease;
        }

        /* 
           Các Class kích hoạt bằng JavaScript khi chuột đến gần.
           Màu sắc sẽ tự động kích hoạt dù chuột chưa chạm vào phần tử!
        */
        .link-item.near.gmail {
            background-color: #EA4335 !important;
            border-color: #EA4335 !important;
            transform: translate3d(0, -3px, 0);
            box-shadow: 0 8px 16px rgba(234, 67, 53, 0.3);
        }

        .link-item.near.youtube {
            background-color: #FF0000 !important;
            border-color: #FF0000 !important;
            transform: translate3d(0, -3px, 0);
            box-shadow: 0 8px 16px rgba(255, 0, 0, 0.3);
        }

        .link-item.near.tiktok {
            background-color: #010101 !important;
            border-color: #25F4EE !important;
            transform: translate3d(0, -3px, 0);
            box-shadow: 0 8px 16px rgba(37, 244, 238, 0.2);
        }

        .link-item.near.discord {
            background-color: #5865F2 !important;
            border-color: #5865F2 !important;
            transform: translate3d(0, -3px, 0);
            box-shadow: 0 8px 16px rgba(88, 101, 242, 0.3);
        }

        .link-item.near.discord-team {
            background: linear-gradient(135deg, #5865F2, #7289DA) !important;
            border-color: #5865F2 !important;
            transform: translate3d(0, -3px, 0);
            box-shadow: 0 8px 16px rgba(88, 101, 242, 0.35);
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="avatar-wrapper">
            <img class="avatar" src="https://placeholder.com" alt="thienan0212">
            <div class="status-dot"></div>
        </div>
        
        <h1 class="username">thienan0212</h1>
        
        <p class="tagline">Welcome to my profile</p>
        
        <div class="links-container">
            <a href="mailto:gmail-cua-ban@gmail.com" class="link-item gmail">Gmail</a>
            <a href="https://youtube.com" target="_blank" class="link-item youtube">YouTube</a>
            <a href="https://tiktok.com" target="_blank" class="link-item tiktok">TikTok</a>
            <a href="https://discord.gg" target="_blank" class="link-item discord">Discord Cá Nhân</a>
            <a href="https://discord.gg" target="_blank" class="link-item discord-team">Discord Team</a>
        </div>
    </div>

    <!-- Đoạn mã JavaScript xử lý khoảng cách tiệm cận của chuột -->
    <script>
        const items = document.querySelectorAll('.link-item');
        // Khoảng cách kích hoạt (tính bằng pixel). Chuột cách nút dưới 60px là nút tự đổi màu.
        const triggerDistance = 30; 

        document.addEventListener('mousemove', (e) => {
            const mouseX = e.clientX;
            const mouseY = e.clientY;

            items.forEach(item => {
                const rect = item.getBoundingClientRect();
                
                // Tìm điểm gần nhất trên cạnh của nút bấm tới con trỏ chuột
                const closestX = Math.max(rect.left, Math.min(mouseX, rect.right));
                const closestY = Math.max(rect.top, Math.min(mouseY, rect.bottom));
                
                // Tính khoảng cách hình học từ chuột đến điểm đó
                const distanceX = mouseX - closestX;
                const distanceY = mouseY - closestY;
                const distance = Math.sqrt(distanceX * distanceX + distanceY * distanceY);

                // Nếu chuột nằm trong phạm vi gần, thêm class 'near' để kích hoạt đổi màu
                if (distance < triggerDistance) {
                    item.classList.add('near');
                } else {
                    item.classList.remove('near');
                }
            });
        });
    </script>
</body>
</html>
